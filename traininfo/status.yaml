# API仕様はYahooに統一する形
# priorityは数値が小さいほど優先度が高い

statuses:
  suspended:
    label: "運転見合わせ"
    priority: 1
    emoji: "🛑"
    NHK_code: ["01"]

  delay:
    label: "列車遅延"
    priority: 2
    emoji: "🕒"
    NHK_code: []

  info:
    label: "運転情報"
    priority: 3
    emoji: "ℹ️"
    NHK_code: []

  operation_status:
    label: "運転状況"
    priority: 4
    emoji: "ℹ️"
    NHK_code: []

  # NHKAPIでは上3つのステータスを包括する広義のステータスとして「ダイヤ乱れ」があるため、これを追加する
  service_disruption:
    label: "ダイヤ乱れ"
    priority: 5
    emoji: "🕒"
    NHK_code: ["03"]

  plan:
    label: "運転計画"
    priority: 6
    emoji: "🗒️"
    NHK_code: ["04"]

  traffic_disruption:
    label: "交通障害情報"
    priority: 7
    emoji: "🚧"
    NHK_code: []

  resumed:
    label: "運転再開"
    priority: 8
    emoji: "🚋"
    NHK_code: ["02"]

  normal:
    label: "平常運転"
    priority: 9
    emoji: "🚋"
    NHK_code: ["00","06"]

  other:
    label: "その他"
    priority: 10
    emoji: "⚠️"
    NHK_code: ["07", "08"] # Yahooでの「その他」に相当する